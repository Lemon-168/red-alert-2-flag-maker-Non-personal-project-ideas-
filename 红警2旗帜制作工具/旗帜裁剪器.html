<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双流程切片工具 - 32片/图</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: #2b2b2b;
            padding: 20px;
            margin: 0;
            color: #e0e0e0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
        }
        .sub {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .controls {
            background: #3a3a3a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .file-area {
            margin-bottom: 15px;
        }
        input[type="file"] {
            background: #555;
            color: white;
            padding: 10px;
            border-radius: 6px;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        button {
            background: #4c9aff;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            font-weight: bold;
        }
        button:hover {
            background: #3a7bc9;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-reset {
            background: #6c757d;
        }
        .btn-reset:hover {
            background: #5a6268;
        }
        .status {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
        }
        .image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: #3a3a3a;
            border-radius: 8px;
            padding: 12px;
            width: 260px;
            border: 1px solid #555;
        }
        .image-card h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            word-break: break-all;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .preview-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 6px;
        }
        .preview-box {
            flex: 1;
            text-align: center;
            font-size: 10px;
        }
        .preview-box canvas {
            width: 100%;
            background: #fc00fc;
            border-radius: 4px;
            border: 1px solid #888;
        }
        .badge {
            font-size: 10px;
            background: #2d2d2d;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        .download-single {
            background: #5a5;
            padding: 5px 12px;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }
        hr {
            border-color: #555;
            margin: 10px 0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
<div class="container">
    <h2>🔀 双流程切片生成器</h2>
    <div class="sub">流程A: 去半透明+填充洋红 → 4x4切片 | 流程B: 半透明→#fcfcfc + 其余区域→#fc00fc → 4x4切片 | 每图共32片，按顺序打包</div>
    <div class="controls">
        <div class="file-area">
            <input type="file" id="fileInput" multiple accept="image/*">
            <div style="font-size:12px; margin-top:6px;">支持多选 PNG/JPG/WebP (半透明处理基于Alpha通道)</div>
        </div>
        <div>
            <button id="processBtn">▶ 批量处理 (生成32片/图)</button>
            <button id="downloadAllBtn" class="btn-reset">📦 打包下载全部图片的32片</button>
            <button id="clearBtn" class="btn-reset">🗑 清空列表</button>
        </div>
        <div class="status" id="statusArea">
            ✅ 就绪: 选择图片后点击批量处理
        </div>
    </div>

    <div id="imageGrid" class="image-list">
        <!-- 动态展示每张图片的处理结果缩略 -->
    </div>
</div>

<script>
    // 存储每张图处理结果: { fileName, processA_tiles[16], processB_tiles[16], previewA_canvas, previewB_canvas, width, height }
    let processedImages = [];

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusArea = document.getElementById('statusArea');
    const imageGrid = document.getElementById('imageGrid');

    function updateStatus(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        statusArea.innerHTML = `[${time}] ${msg}<br>${statusArea.innerHTML}`;
        if (statusArea.children.length > 25) {
            while(statusArea.children.length > 25) statusArea.removeChild(statusArea.lastChild);
        }
        if (isError) console.error(msg);
    }

    // ---------- 核心像素处理 ----------
    // 流程A: 去半透明(0<alpha<255 -> alpha=0) + 所有透明区域填充 #fc00fc (不透明)
    function processFlowA(img) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imageData.data;
        
        // 1. 半透明 -> 完全透明
        for (let i = 0; i < data.length; i += 4) {
            let alpha = data[i+3];
            if (alpha !== 0 && alpha !== 255) {
                data[i+3] = 0;
            }
        }
        // 2. 所有透明像素(alpha===0) 填充 #fc00fc (R=252,G=0,B=252, alpha=255)
        for (let i = 0; i < data.length; i += 4) {
            if (data[i+3] === 0) {
                data[i]   = 252;
                data[i+1] = 0;
                data[i+2] = 252;
                data[i+3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas;
    }
    
    // 流程B: 半透明像素都填充为完全不透明的 #fcfcfc，其他区域(包括原本不透明和原本完全透明区域)全部填充为 #fc00fc
    // 注意定义: "其他区域" = 原图中非半透明的所有像素(包括原本完全不透明和原本完全透明的区域)
    // 步骤: 遍历原图，如果alpha是半透明(0<alpha<255) -> 设为 #fcfcfc (R=252,G=252,B=252, A=255)
    //       否则(包括alpha=0或alpha=255) -> 填充 #fc00fc (R=252,G=0,B=252, A=255)
    function processFlowB(img) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            let alpha = data[i+3];
            // 判断是否为半透明 (0 < alpha < 255)
            if (alpha !== 0 && alpha !== 255) {
                // 半透明区域 -> #fcfcfc (252,252,252) 完全不透明
                data[i]   = 252;
                data[i+1] = 252;
                data[i+2] = 252;
                data[i+3] = 255;
            } else {
                // 其他区域(完全透明alpha=0 或 完全不透明alpha=255) 都填充为 #fc00fc
                data[i]   = 252;
                data[i+1] = 0;
                data[i+2] = 252;
                data[i+3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas;
    }
    
    // 将canvas切割为4x4网格，返回canvas数组(16个) 顺序: 左→右, 上→下
    function splitTo16Tiles(sourceCanvas) {
        const w = sourceCanvas.width;
        const h = sourceCanvas.height;
        const tileW = w / 4;
        const tileH = h / 4;
        const tiles = [];
        
        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 4; col++) {
                const tileCanvas = document.createElement('canvas');
                tileCanvas.width = tileW;
                tileCanvas.height = tileH;
                const ctx = tileCanvas.getContext('2d');
                ctx.drawImage(sourceCanvas,
                    col * tileW, row * tileH, tileW, tileH,
                    0, 0, tileW, tileH
                );
                tiles.push(tileCanvas);
            }
        }
        return tiles;
    }
    
    // 生成缩略图canvas (用于卡片预览)
    function createThumbnail(canvas, maxWidth = 100) {
        const thumb = document.createElement('canvas');
        const ratio = canvas.height / canvas.width;
        thumb.width = maxWidth;
        thumb.height = maxWidth * ratio;
        const ctx = thumb.getContext('2d');
        ctx.drawImage(canvas, 0, 0, thumb.width, thumb.height);
        return thumb;
    }
    
    // 渲染所有图片卡片 (显示两个流程的缩略)
    function renderImageCards() {
        if (processedImages.length === 0) {
            imageGrid.innerHTML = '<div style="color:#aaa; padding:40px; text-align:center;">暂无图片，请选择图片并点击"批量处理"</div>';
            return;
        }
        
        let html = '';
        for (let idx = 0; idx < processedImages.length; idx++) {
            const item = processedImages[idx];
            const thumbA = createThumbnail(item.previewA_canvas, 110);
            const thumbB = createThumbnail(item.previewB_canvas, 110);
            const thumbAData = thumbA.toDataURL();
            const thumbBData = thumbB.toDataURL();
            
            html += `
                <div class="image-card" data-idx="${idx}">
                    <h4 title="${item.fileName}">📷 ${item.fileName.substring(0, 28)}${item.fileName.length>28?'...':''}</h4>
                    <div class="preview-row">
                        <div class="preview-box">
                            <canvas style="width:100%;" width="110" height="${110 * (item.height/item.width)}"></canvas>
                            <div>流程A<br><span style="font-size:9px;">去半透+洋红</span></div>
                        </div>
                        <div class="preview-box">
                            <canvas style="width:100%;" width="110" height="${110 * (item.height/item.width)}"></canvas>
                            <div>流程B<br><span style="font-size:9px;">半透→#fcfcfc</span></div>
                        </div>
                    </div>
                    <div class="badge">尺寸: ${item.width}×${item.height}</div>
                    <div class="badge" style="margin-left:6px;">切片: A(16) + B(16) = 32片</div>
                    <button class="downloadSingleBtn" data-idx="${idx}" style="background:#5a5; padding:5px 10px; font-size:11px; margin-top:8px; width:100%;">⬇️ 下载此图32片 (A+B)</button>
                </div>
            `;
        }
        imageGrid.innerHTML = html;
        
        // 为每个卡片内的canvas绘制真实缩略图 (因为上面用了静态canvas标签)
        for (let idx = 0; idx < processedImages.length; idx++) {
            const card = document.querySelector(`.image-card[data-idx="${idx}"]`);
            if (card) {
                const canvases = card.querySelectorAll('.preview-box canvas');
                if (canvases.length >= 2) {
                    const thumbA_real = createThumbnail(processedImages[idx].previewA_canvas, 110);
                    const thumbB_real = createThumbnail(processedImages[idx].previewB_canvas, 110);
                    const ctxA = canvases[0].getContext('2d');
                    const ctxB = canvases[1].getContext('2d');
                    canvases[0].width = 110;
                    canvases[0].height = 110 * (processedImages[idx].height / processedImages[idx].width);
                    canvases[1].width = 110;
                    canvases[1].height = 110 * (processedImages[idx].height / processedImages[idx].width);
                    ctxA.drawImage(thumbA_real, 0, 0, canvases[0].width, canvases[0].height);
                    ctxB.drawImage(thumbB_real, 0, 0, canvases[1].width, canvases[1].height);
                }
            }
        }
        
        // 绑定单独下载按钮事件
        document.querySelectorAll('.downloadSingleBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && processedImages[idx]) {
                    downloadSingleImage32Slices(idx);
                }
            });
        });
    }
    
    // 下载单张图片的32个切片: 先放流程A的16片(顺序左→右,上→下)，再放流程B的16片(同样顺序)
    // 命名规则: 原文件名_A_row_col.png 和 原文件名_B_row_col.png 以便区分
    function downloadSingleImage32Slices(index) {
        const item = processedImages[index];
        if (!item || !item.processA_tiles || !item.processB_tiles) {
            alert('切片数据无效，请重新处理');
            return;
        }
        const zip = new JSZip();
        const baseName = item.fileName.replace(/\.[^/.]+$/, "");
        const folderName = `${baseName}_32slices`;
        const folder = zip.folder(folderName);
        
        // 流程A的16片 (索引0~15)
        for (let i = 0; i < item.processA_tiles.length; i++) {
            const tileCanvas = item.processA_tiles[i];
            const row = Math.floor(i / 4);
            const col = i % 4;
            const filename = `${baseName}_A_${row}_${col}.png`;
            const dataURL = tileCanvas.toDataURL('image/png');
            const base64 = dataURL.split(',')[1];
            folder.file(filename, base64, { base64: true });
        }
        // 流程B的16片
        for (let i = 0; i < item.processB_tiles.length; i++) {
            const tileCanvas = item.processB_tiles[i];
            const row = Math.floor(i / 4);
            const col = i % 4;
            const filename = `${baseName}_B_${row}_${col}.png`;
            const dataURL = tileCanvas.toDataURL('image/png');
            const base64 = dataURL.split(',')[1];
            folder.file(filename, base64, { base64: true });
        }
        
        zip.generateAsync({ type: "blob" }).then(blob => {
            saveAs(blob, `${baseName}_32slices.zip`);
            updateStatus(`✅ 已下载: ${baseName}_32slices.zip (A16+B16)`);
        }).catch(err => {
            updateStatus(`❌ 下载失败: ${err.message}`, true);
        });
    }
    
    // 打包下载所有图片的所有切片: 每个图片单独文件夹，内部包含该图的32片 (A16+B16)
    function downloadAllSlices() {
        if (processedImages.length === 0) {
            alert('没有已处理的图片，请先选择图片并执行批量处理');
            return;
        }
        
        const masterZip = new JSZip();
        let hasError = false;
        
        for (let idx = 0; idx < processedImages.length; idx++) {
            const item = processedImages[idx];
            if (!item.processA_tiles || !item.processB_tiles || item.processA_tiles.length !== 16 || item.processB_tiles.length !== 16) {
                updateStatus(`⚠️ 图片 "${item.fileName}" 切片不完整，跳过`, true);
                hasError = true;
                continue;
            }
            const baseName = item.fileName.replace(/\.[^/.]+$/, "");
            const folder = masterZip.folder(`${baseName}_32slices`);
            
            // A组16片
            for (let i = 0; i < item.processA_tiles.length; i++) {
                const tileCanvas = item.processA_tiles[i];
                const row = Math.floor(i / 4);
                const col = i % 4;
                const filename = `${baseName}_A_${row}_${col}.png`;
                const dataURL = tileCanvas.toDataURL('image/png');
                const base64 = dataURL.split(',')[1];
                folder.file(filename, base64, { base64: true });
            }
            // B组16片
            for (let i = 0; i < item.processB_tiles.length; i++) {
                const tileCanvas = item.processB_tiles[i];
                const row = Math.floor(i / 4);
                const col = i % 4;
                const filename = `${baseName}_B_${row}_${col}.png`;
                const dataURL = tileCanvas.toDataURL('image/png');
                const base64 = dataURL.split(',')[1];
                folder.file(filename, base64, { base64: true });
            }
        }
        
        if (Object.keys(masterZip.files).length === 0) {
            alert('没有有效的切片数据可打包');
            return;
        }
        
        masterZip.generateAsync({ type: "blob" }).then(blob => {
            saveAs(blob, `all_images_32slices_total.zip`);
            updateStatus(`📦 批量打包完成: all_images_32slices_total.zip (共${processedImages.length}张图, 每图32片)`);
        }).catch(err => {
            updateStatus(`❌ 打包失败: ${err.message}`, true);
        });
    }
    
    // 处理单张图片: 返回 { fileName, processA_tiles, processB_tiles, previewA_canvas, previewB_canvas, width, height }
    async function processOneImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    try {
                        // 流程A 完整canvas
                        const canvasA = processFlowA(img);
                        // 流程B 完整canvas
                        const canvasB = processFlowB(img);
                        // 切片
                        const tilesA = splitTo16Tiles(canvasA);
                        const tilesB = splitTo16Tiles(canvasB);
                        
                        resolve({
                            fileName: file.name,
                            processA_tiles: tilesA,
                            processB_tiles: tilesB,
                            previewA_canvas: canvasA,
                            previewB_canvas: canvasB,
                            width: img.width,
                            height: img.height,
                        });
                    } catch (err) {
                        reject(err);
                    }
                };
                img.onerror = () => reject(new Error(`图片加载失败: ${file.name}`));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error(`文件读取失败: ${file.name}`));
            reader.readAsDataURL(file);
        });
    }
    
    // 批量处理所有选中文件
    async function batchProcess(files) {
        if (!files || files.length === 0) {
            alert('请先选择图片文件');
            return;
        }
        
        updateStatus(`🚀 开始批量处理 ${files.length} 张图片 (每张生成32切片)...`);
        processBtn.disabled = true;
        processBtn.textContent = '⏳ 处理中...';
        
        const newProcessed = [];
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            try {
                updateStatus(`📸 处理 (${i+1}/${files.length}): ${file.name}`);
                const result = await processOneImage(file);
                newProcessed.push(result);
                successCount++;
            } catch (err) {
                failCount++;
                updateStatus(`❌ 错误 ${file.name}: ${err.message}`, true);
            }
        }
        
        if (newProcessed.length > 0) {
            processedImages = newProcessed;
            renderImageCards();
            updateStatus(`✅ 批量处理完成! 成功: ${successCount} 张, 失败: ${failCount} 张。每张图已生成流程A+流程B共32切片，可打包下载或单独下载。`);
        } else {
            updateStatus(`⚠️ 没有成功处理的图片，请检查文件格式`);
            if (processedImages.length === 0) renderImageCards();
        }
        
        processBtn.disabled = false;
        processBtn.textContent = '▶ 批量处理 (生成32片/图)';
    }
    
    // 清空所有数据
    function clearAll() {
        processedImages = [];
        renderImageCards();
        fileInput.value = '';
        updateStatus('🗑 已清空所有图片数据');
    }
    
    // 事件绑定
    processBtn.addEventListener('click', () => {
        const files = fileInput.files;
        if (!files || files.length === 0) {
            alert('请先通过文件选择器选择图片（可多选）');
            return;
        }
        batchProcess(Array.from(files));
    });
    
    downloadAllBtn.addEventListener('click', downloadAllSlices);
    clearBtn.addEventListener('click', clearAll);
    
    // 初始渲染
    renderImageCards();
    updateStatus('就绪。选择图片，点击"批量处理" → 每张图生成A(去半透明+洋红+切片) + B(半透→#fcfcfc，其余→#fc00fc+切片) 共32片，按顺序打包。');
</script>
</body>
</html>
