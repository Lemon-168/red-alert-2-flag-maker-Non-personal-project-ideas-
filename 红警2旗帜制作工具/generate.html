<html>

<head>
    <title>《红色警戒2》旗帜制作器 by WAIFor</title>
</head>

<body>
    <div class="nav-bar">
        <input type="file" onchange="output(this)">
        <span>
            显示背景色：
            <button class="color-button" color="#FF0000"></button>
            <button class="color-button" color="#00FF00"></button>
            <button class="color-button" color="#0000FF"></button>
            <button class="color-button" color="#FF00FF"></button>
            <button class="color-button" color="#FFFFFF"></button>
        </span>
        <input id="postCheckbox" type="checkbox"checked>
        <label for="postCheckbox">显示旗杆</label>
        <input id="animationCheckbox" type="checkbox">
        <label for="animationCheckbox">显示动画</label>
        <div style="text-align: right;">
            生成后，右键选择保存即可导出4×4序列的图像（不含旗杆）。之后可在SMX Workshop中使用，将图像制作成SHP。
        </div>
    </div>
    <div id="result">
        
    </div>

<style>
    body {
		background-color: lightgray;
		accent-color: brown;
    }

    .nav-bar {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        height: 60px;
        padding: 8px;
		background-color: #FAECD0;
    }

    .color-button {
        width: 40px;
        height: 24px;
        border: solid 1px gray;
        vertical-align: middle;
    }

    #result {
        width: 244px;
        height: 208px;
        position: absolute;
        overflow: hidden;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        background: url('post.png') no-repeat;
    }
    #result canvas, #result img {
        position: absolute;
        animation: steps(1) 1s infinite flag-anim;
        animation-play-state: paused;
    }
    
    
    #result:hover *, #result.animated * {
        animation-play-state: running;
    }

    @keyframes flag-anim {
        0% { left: 0; top: 0; }
        6.25% { left: -244px; top: 0; }
        12.5% { left: -488px; top: 0; }
        18.75% { left: -732px; top: 0; }
        25% { left: 0; top: -208px; }
        31.25% { left: -244px; top: -208px; }
        37.5% { left: -488px; top: -208px; }
        43.75% { left: -732px; top: -208px; }
        50% { left: 0; top: -416px; }
        56.25% { left: -244px; top: -416px; }
        62.5% { left: -488px; top: -416px; }
        68.75% { left: -732px; top: -416px; }
        75% { left: 0; top: -624px; }
        81.25% { left: -244px; top: -624px; }
        87.5% { left: -488px; top: -624px; }
        93.75% { left: -732px; top: -624px; }
        100% { left: 0; top: 0; }
    }
</style>


<script>
    var mapLoaded = false;
    var map = new Image();
    onload = function() {
        map.src = MapUrl;

        var resultContainer = document.getElementById('result');
        resultContainer.appendChild(map);

        var colorButtons = document.getElementsByClassName('color-button');
        for (var i = colorButtons.length - 1; i >= 0; --i) {
            var button = colorButtons[i];
            button.style.backgroundColor = button.getAttribute('color');
            button.onclick = function() {
                resultContainer.style.backgroundColor = this.getAttribute('color');
            }
        }

        document.getElementById('animationCheckbox').onchange = function() {
            resultContainer.className = this.checked ? 'animated' : '';
        }
        document.getElementById('postCheckbox').onchange = function() {
            resultContainer.style.backgroundImage = this.checked ? '' : 'none';
        }
    }

    function output(element) {
        var file = element.files[0];
        if (file) {
            var reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = function() {
                var image = new Image();
                image.src = reader.result;
                image.onload = function() {
                    var canvas = imageToCanvas(map);
                    var ctx = canvas.getContext('2d');
                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    const flagWidth = 80, flagHeight = 40;
                    var mcanvas = imageToCanvas(image, flagWidth, flagHeight);
                    var mImageData = mcanvas.getContext('2d').getImageData(0, 0, flagWidth, flagHeight);

                    for (var i = 0; i < imageData.data.length; i += 4) {
                        var r = imageData.data[i];
                        var g = imageData.data[i + 1];
                        var b = imageData.data[i + 2];
                        var a = imageData.data[i + 3];
                        if (a == 255) {
                            var l = (b / 255 - 0.75) * 2 + 0.75;
                            var x = Math.max(0, l - 1.0) * 255;
                            var off = (Math.round(r * (flagWidth - 1) / 255) + Math.round(g * (flagHeight - 1) / 255) * flagWidth) * 4;
                            imageData.data[i] = mImageData.data[off] * l + x;
                            imageData.data[i + 1] = mImageData.data[off + 1] * l + x;
                            imageData.data[i + 2] = mImageData.data[off + 2] * l + x;
                            imageData.data[i + 3] = mImageData.data[off + 3];
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    document.getElementById('result').innerHTML = '';
                    document.getElementById('result').appendChild(canvas);
                }
            }
        }
    }

    function imageToCanvas(image, width, height) {
        var canvas = document.createElement('canvas');
        canvas.width = width || image.naturalWidth;
        canvas.height = height || image.naturalHeight;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas;
    }
